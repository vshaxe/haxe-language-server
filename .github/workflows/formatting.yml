name: Formatting

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: true

    - uses: krdlab/setup-haxe@v1
      with:
        haxe-version: latest

    - name: Install dependencies
      run: |
        npm ci
        haxelib newrepo
        haxelib state load install.hxml

    - name: Check dependencies
      run: |
        haxe -version
        haxelib list

    - name: Run formatter
      run: |
        haxelib run formatter -s shared -s src --check
